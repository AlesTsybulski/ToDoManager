{% extends 'base.html' %}
{% block title %}Edit Task — TaskHUB{% endblock %}

{% block content %}
<div class="page">
    <div class="card">
        <div class="card-header" style="flex-direction:column;gap:var(--space-1);">
            <div class="card-title">Edit Task</div>
        </div>

        <form method="post" novalidate>
            {% csrf_token %}
            <label class="label" for="id_title">Task title</label>
            <input id="id_title" type="text" name="title" required class="input"
                   value="{{ obj.title }}" autocomplete="off">

            <label class="label" for="id_deadline">
                Deadline <span class="label-note">(optional)</span>
            </label>
            <input id="id_deadline" type="datetime-local" name="deadline" class="input"
                   {% if obj.deadline %}value="{{ obj.deadline|date:'Y-m-d' }}T{{ obj.deadline|date:'H:i' }}"{% endif %}>

            <input class="btn" type="submit" value="Save Changes">
        </form>

        <div class="divider"></div>
        <div class="auth-link">
            <a href="{% url 'todo' %}">← Back to tasks</a>
        </div>
    </div>
</div>
{% endblock %}
