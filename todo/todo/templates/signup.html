{% extends 'base.html' %}
{% block title %}Sign Up — TaskFlow{% endblock %}

{% block content %}
<div class="page">
    <div class="card">
        <div class="card-header" style="flex-direction:column;gap:var(--space-1);">
            <div class="card-title">Create account</div>
            <div class="card-subtitle">Start managing your tasks today</div>
        </div>

        {% if error %}
        <div class="form-error">{{ error }}</div>
        {% endif %}

        <form method="post" novalidate>
            {% csrf_token %}
            <label class="label" for="id_username">Username</label>
            <input id="id_username" class="input" type="text" name="fnm" required
                   placeholder="Choose a username" autocomplete="username"
                   value="{{ fnm|default:'' }}">

            <label class="label" for="id_email">Email</label>
            <input id="id_email" class="input" type="email" name="emailid" required
                   placeholder="Enter your email" autocomplete="email"
                   value="{{ emailid|default:'' }}">

            <label class="label" for="id_password">Password</label>
            <input id="id_password" class="input" type="password" name="pwd" required
                   placeholder="Choose a password" autocomplete="new-password">

            <input class="btn" type="submit" value="Create account">
        </form>

        <div class="divider"></div>
        <div class="auth-link">
            Already have an account? <a href="{% url 'login' %}">Sign in</a>
        </div>
    </div>
</div>
{% endblock %}
