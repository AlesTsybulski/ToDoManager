{% extends 'base.html' %}
{% block title %}Sign In — TaskHUB{% endblock %}

{% block content %}
<div class="page">
    <div class="card">
        <div class="card-header" style="flex-direction:column;gap:var(--space-1);">
            <div class="card-title">Welcome back</div>
            <div class="card-subtitle">Sign in to your account</div>
        </div>

        <form method="post" novalidate>
            {% csrf_token %}
            <label class="label" for="id_username">Username</label>
            <input id="id_username" class="input" type="text" name="fnm" required
                   placeholder="Enter your username" autocomplete="username">

            <label class="label" for="id_password">Password</label>
            <input id="id_password" class="input" type="password" name="pwd" required
                   placeholder="Enter your password" autocomplete="current-password">

            <input class="btn" type="submit" value="Sign in">
        </form>

        <div class="divider"></div>
        <div class="auth-link">
            Don't have an account? <a href="{% url 'signup' %}">Sign up</a>
        </div>
    </div>
</div>
{% endblock %}
